<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gucci Intelligence</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='11' fill='%23175e3d'/%3E%3Crect y='11' width='32' height='10' fill='%23a91622'/%3E%3Crect y='21' width='32' height='11' fill='%23175e3d'/%3E%3C/svg%3E">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f0e0c">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Cormorant+Garamond:wght@300;400;500&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#0f0e0c; --panel:#181613; --panel2:#1f1c18; --line:#2e2a24;
  --gold:#c9a24b; --gold-dim:#8a7440; --ink:#e8e2d5; --ink-dim:#9a927f;
  --green:#3ba272; --red:#d05555; --amber:#d0a04a; --blue:#7fa8d6;
  --serif:'EB Garamond',Georgia,'Times New Roman',serif;
  --num:'Cormorant Garamond',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100%;overscroll-behavior-x:none}
body{touch-action:pan-y pinch-zoom} /* page pans vertically only */
.panel,.repview{touch-action:auto}  /* wide tables scroll inside their own box */
section,.rep>*,.grid2>*,.newscols>*,.pgrid>*,.cards>*{min-width:0}
body{background:var(--bg);color:var(--ink);font-family:'Pretendard Variable',Pretendard,'Malgun Gothic','Segoe UI',sans-serif;font-size:14px;font-weight:350;letter-spacing:.01em;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  background-image:repeating-linear-gradient(45deg,rgba(201,162,75,.016) 0 1px,transparent 1px 14px),repeating-linear-gradient(-45deg,rgba(201,162,75,.016) 0 1px,transparent 1px 14px)}
.gstripe{height:6px;background:linear-gradient(180deg,#175e3d 0 34%,#a91622 34% 66%,#175e3d 66% 100%)}
header{display:flex;align-items:baseline;gap:14px;padding:20px 26px 14px;border-bottom:1px solid var(--line)}
header h1{font-family:var(--serif);font-size:22px;color:var(--gold);font-weight:600;letter-spacing:.32em}
header h1 small{font-weight:400;font-size:13px;letter-spacing:.45em;color:var(--gold-dim);margin-left:10px}
header .sub{color:var(--ink-dim);font-size:12px}
header .right{margin-left:auto;display:flex;gap:8px;align-items:center}
.langtog{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.langtog button{background:none;border:none;color:var(--ink-dim);padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;letter-spacing:.06em}
.langtog button.on{background:var(--panel2);color:var(--gold)}
nav{display:flex;gap:2px;padding:0 26px;border-bottom:1px solid var(--line);overflow-x:auto}
nav button{background:none;border:none;color:var(--ink-dim);padding:12px 16px;font-size:13px;font-weight:450;letter-spacing:.12em;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap}
nav button.on{color:var(--gold);border-bottom-color:var(--gold)}
main{padding:20px 26px;max-width:1180px;margin:0 auto}
.hidden{display:none !important}
h2.sec{font-family:var(--serif);font-size:13px;color:var(--gold-dim);font-weight:500;letter-spacing:.28em;margin:4px 0 10px}
/* cards */
.cards{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.card{background:linear-gradient(165deg,#1b1815,#151310);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.card:hover{border-color:#3d3628}
.card h3{font-size:11px;color:var(--ink-dim);font-weight:450;margin-bottom:7px;letter-spacing:.22em}
.card .big{font-size:44px;font-family:var(--num);font-weight:300;color:var(--gold);line-height:1.05}
.card .num{font-size:31px;font-family:var(--num);font-weight:300;line-height:1.1}
.card .band{display:inline-block;font-size:11px;padding:2px 8px;border-radius:9px;margin-left:8px;vertical-align:middle}
.card .delta{font-size:12px;margin-top:2px;color:var(--ink-dim)}
.delta .up{color:var(--green)} .delta .down{color:var(--red)}
.gauge{float:right;margin-top:-4px}
.comp{margin-top:10px}
.comp .row{display:flex;align-items:center;gap:7px;margin-top:4px;font-size:11px;color:var(--ink-dim)}
.comp .row span:first-child{width:38px}
.bar{flex:1;height:5px;background:var(--panel2);border-radius:3px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--gold-dim);border-radius:3px}
.b-강한매력{background:#1d4d33;color:#7fd6a4}.b-우호{background:#274633;color:#8fc9a3}
.b-중립{background:#3a3527;color:#cbb877}.b-주의{background:#4d3a1d;color:#e0a95f}.b-경고{background:#4d1d1d;color:#e08080}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:16px;overflow-x:auto}
.panel h2{font-family:var(--serif);font-size:13px;color:var(--gold-dim);font-weight:500;letter-spacing:.28em;margin-bottom:10px}
.trigger{color:var(--red);font-size:13px;padding:3px 0}
.empty{color:var(--ink-dim);text-align:center;padding:46px 20px;line-height:2}
.empty .go{display:inline-block;margin-top:8px;color:var(--gold);cursor:pointer;border:1px solid var(--gold-dim);border-radius:8px;padding:7px 16px}
.legend{display:flex;gap:16px;font-size:11px;color:var(--ink-dim);margin-top:6px;flex-wrap:wrap}
.legend i{display:inline-block;width:14px;height:3px;margin-right:5px;vertical-align:middle}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
/* sov + mix */
.sovrow{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:12.5px}
.sovrow .nm{width:130px;color:var(--ink-dim)}
.sovrow.gucci .nm{color:var(--gold)}
.sovrow .bar{height:9px}
.sovrow.gucci .bar i{background:var(--gold)}
.sovrow .v{width:44px;text-align:right;font-family:var(--num);font-size:15px}
.mixrow{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:12.5px}
.mixrow .nm{width:80px;color:var(--ink-dim)}
.mix{flex:1;display:flex;height:11px;border-radius:6px;overflow:hidden;background:var(--panel2)}
.mix i{display:block;height:100%}
.mixrow .v{width:110px;text-align:right;font-size:11px;color:var(--ink-dim)}
/* report previews */
.prevs{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.prev{background:linear-gradient(165deg,#1b1815,#151310);border:1px solid var(--line);border-radius:10px;padding:14px 16px;cursor:pointer}
.prev:hover{border-color:var(--gold-dim)}
.prev .cat{font-size:10px;color:var(--gold-dim);letter-spacing:.18em;margin-bottom:5px}
.prev .ttl{font-size:13px;color:var(--gold);margin-bottom:7px;font-weight:500}
.prev .txt{font-size:12px;color:var(--ink-dim);line-height:1.75;max-height:74px;overflow:hidden}
.prev .tm{font-size:10.5px;color:var(--ink-dim);margin-top:8px}
/* special */
.spitem{background:linear-gradient(160deg,#201c15,#151310);border:1px solid var(--gold-dim);border-radius:12px;padding:20px 22px;margin-bottom:14px;cursor:pointer;position:relative;overflow:hidden}
.spitem::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,#175e3d 0 34%,#a91622 34% 66%,#175e3d 66% 100%)}
.spitem:hover{border-color:var(--gold)}
.spitem .cat{font-family:var(--serif);font-size:11px;color:var(--gold);letter-spacing:.35em;margin-bottom:8px}
.spitem .ttl{font-size:16px;font-weight:550;margin-bottom:6px}
.spitem .tm{font-size:11px;color:var(--ink-dim)}
/* news */
.newshead{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
.newshead .d{font-family:var(--num);font-size:22px;color:var(--gold)}
.newscols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.newsitem{background:linear-gradient(165deg,#1b1815,#151310);border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:10px;display:flex;gap:13px}
.newsitem:hover{border-color:var(--gold-dim)}
.newsitem .rk{font-family:var(--num);font-size:26px;font-weight:300;color:var(--gold-dim);min-width:26px;text-align:center;line-height:1.2}
.newsitem .ti{font-size:13.5px;font-weight:500;margin-bottom:5px;line-height:1.5}
.newsitem .sm{font-size:12.5px;color:var(--ink-dim);line-height:1.7;margin-bottom:5px}
.newsitem .why{font-size:12px;color:var(--amber);line-height:1.6}
.newsitem .src{font-size:11px;color:var(--ink-dim);margin-top:6px}
.newsitem .src a{color:var(--blue);text-decoration:none}
.tierb{display:inline-block;font-size:9.5px;border:1px solid var(--gold-dim);color:var(--gold);border-radius:4px;padding:0 5px;margin-right:6px;vertical-align:1px}
/* news accordions */
.acc{background:linear-gradient(165deg,#1b1815,#151310);border:1px solid var(--line);border-radius:10px;margin-bottom:12px;overflow:hidden}
.acchead{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none}
.acchead .at{font-family:var(--serif);font-size:13px;letter-spacing:.28em;color:var(--gold)}
.acchead .an{font-size:11px;color:var(--ink-dim)}
.acchead .chev{margin-left:auto;color:var(--gold-dim);transition:transform .18s;font-size:12px}
.acc.open .chev{transform:rotate(90deg)}
.accbody{display:none;padding:2px 14px 14px}
.acc.open .accbody{display:block}
.acchead:hover .at{color:#e0c169}
/* luxury watch */
.luxgroups{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.luxgroups button{background:var(--panel);border:1px solid var(--line);border-radius:18px;color:var(--ink-dim);padding:7px 16px;cursor:pointer;font-family:inherit;font-size:12.5px}
.luxgroups button.on{color:var(--gold);border-color:var(--gold-dim)}
.luxitem{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.luxitem .top{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.luxitem .brand{color:var(--gold);font-weight:550;font-size:13.5px}
.luxitem .etype{font-size:11px;color:var(--ink-dim)}
.tag{font-size:10.5px;padding:2px 9px;border-radius:9px;letter-spacing:.03em}
.tag.threat{background:#4d1d1d;color:#e08080}.tag.bench{background:#1d4d33;color:#7fd6a4}
.tag.trend{background:#1d3a4d;color:#7fb8e0}.tag.etc{background:#33302a;color:#9a927f}
.luxitem .hd{font-size:13.5px;margin-bottom:5px}
.luxitem .why{font-size:12.5px;color:var(--amber)}
.luxitem .src{font-size:11px;color:var(--ink-dim);margin-top:6px}
.luxitem .src a{color:var(--blue);text-decoration:none}
/* products */
.pinsight{background:linear-gradient(160deg,#201c15,#151310);border:1px solid var(--gold-dim);border-radius:10px;padding:15px 18px;margin-bottom:14px;font-size:13px;line-height:1.9}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pcard{display:flex;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px;overflow:hidden}
.pcard:hover{border-color:var(--gold-dim)}
.pimg{width:118px;height:118px;flex:none;border-radius:8px;background:var(--panel2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.pimg img{width:100%;height:100%;object-fit:cover}
.pimg .ph{font-family:var(--serif);color:var(--gold-dim);font-size:26px;letter-spacing:.1em}
.pbody{flex:1;min-width:0}
.plabel{display:inline-block;font-size:10px;padding:2px 9px;border-radius:8px;letter-spacing:.08em;margin-bottom:5px}
.pl-hot{background:#4d1d1d;color:#ff9d9d}.pl-trend{background:#4d1d3a;color:#e080b8}
.pl-new{background:#1d3a4d;color:#7fb8e0}.pl-steady{background:#33302a;color:#cbb877}.pl-best{background:#1d4d33;color:#7fd6a4}
.pname{font-size:13.5px;font-weight:550;margin-bottom:2px}
.pline{font-size:11px;color:var(--ink-dim);margin-bottom:5px}
.pwhy{font-size:12px;line-height:1.65;color:#d5cebd}
.pev{font-size:11.5px;color:var(--amber);margin-top:5px;line-height:1.5}
.psrc{font-size:10.5px;color:var(--ink-dim);margin-top:5px}
.psrc a{color:var(--blue);text-decoration:none}
@media (max-width:980px){ .pgrid{grid-template-columns:1fr} }
/* calendar & ambassadors */
.calitem{display:flex;gap:16px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px 16px;margin-bottom:10px;align-items:flex-start}
.calitem .cd{font-family:var(--num);font-size:19px;color:var(--gold);min-width:110px;line-height:1.3}
.calitem .cd small{display:block;font-family:inherit;font-size:10.5px;color:var(--ink-dim);letter-spacing:.08em}
.calitem .ct{flex:1}
.calitem .ce{font-size:13.5px;font-weight:500;margin-bottom:4px}
.calitem .cw{font-size:12.5px;color:var(--ink-dim);line-height:1.7}
.calitem .ca{font-size:12px;color:var(--amber);margin-top:4px}
.calitem .cs{font-size:11px;color:var(--ink-dim);margin-top:5px}
.calitem .cs a{color:var(--blue);text-decoration:none}
.typeb{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;margin-left:8px;vertical-align:2px}
.ty-show{background:#4d1d3a;color:#e080b8}.ty-earnings{background:#1d3a4d;color:#7fb8e0}
.ty-launch{background:#1d4d33;color:#7fd6a4}.ty-industry{background:#33302a;color:#9a927f}
.ambitem{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px 16px;margin-bottom:10px}
.ambitem.gucci{border-color:var(--gold-dim)}
.ambitem .an{font-size:14px;font-weight:550;color:var(--gold)}
.ambitem .aa{font-size:11.5px;color:var(--ink-dim);margin-left:8px}
.ambitem .aw{font-size:12.5px;margin-top:5px;line-height:1.7}
.ambitem .ai{font-size:12px;color:var(--amber);margin-top:4px;line-height:1.6}
.ambitem .as{font-size:11px;color:var(--ink-dim);margin-top:5px}
.ambitem .as a{color:var(--blue);text-decoration:none}
/* events */
.evcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:12px}
.evcard .eid{font-family:var(--serif);font-size:16px;color:var(--gold);letter-spacing:.06em;margin-bottom:10px}
.cp{display:flex;align-items:center;gap:12px;padding:7px 0;border-top:1px dashed var(--line);font-size:13px}
.cp .cpn{color:var(--amber);width:70px;font-family:var(--num);font-size:15px}
.cp .tm{color:var(--ink-dim);font-size:11.5px}
.cp .open{margin-left:auto;color:var(--blue);cursor:pointer;font-size:12px}
/* guide */
.gcards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.gcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.gcard .w{font-family:var(--num);font-size:30px;font-weight:300;color:var(--gold)}
.gcard .t{font-size:13px;margin:4px 0 6px;font-weight:500}
.gcard .d{font-size:12px;color:var(--ink-dim);line-height:1.7}
table.gt{border-collapse:collapse;width:100%;margin:6px 0}
table.gt td,table.gt th{border:1px solid var(--line);padding:7px 11px;font-size:12.5px;text-align:left}
table.gt th{background:var(--panel2);color:var(--gold);font-weight:500}
.chip{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:4px 12px;font-size:12px;margin:3px 4px 3px 0;color:var(--ink-dim)}
.chip.hot{color:var(--gold);border-color:var(--gold-dim)}
.sigrow{margin:5px 0;line-height:1.9}
.sigrow .regnm{color:var(--ink-dim);display:inline-block;min-width:56px;font-size:12px}
.gnote{font-size:12.5px;color:var(--ink-dim);line-height:1.9}
/* reports */
.rep{display:grid;grid-template-columns:300px 1fr;gap:14px;min-height:480px}
.replist{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px;overflow-y:auto;max-height:72vh}
.replist .repdate{padding:10px 10px 6px;font-size:12px;color:var(--gold);letter-spacing:.08em;font-weight:600;border-bottom:1px solid var(--line);margin-bottom:4px;text-align:left;cursor:pointer;user-select:none}
.replist .repdate:hover{background:var(--panel2)}
.replist .repdate:not(:first-child){margin-top:10px}
.replist .repdate .arr{display:inline-block;width:14px;color:var(--gold-dim);font-size:10px}
.replist .repdate .cnt{float:right;color:var(--ink-dim);font-size:10.5px;font-weight:400;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:1px 7px}
.sechead{font-size:14px;color:var(--gold);letter-spacing:.08em;font-weight:600;border-bottom:1px solid var(--line);padding-bottom:7px;margin-bottom:4px}
.secnote{font-size:12px;color:var(--ink-dim);margin-bottom:12px}
.replist .item{padding:9px 10px 9px 16px;border-radius:7px;cursor:pointer;margin-bottom:2px;text-align:left}
.replist .item:hover{background:var(--panel2)}
.replist .item.on{background:var(--panel2);border-left:2px solid var(--gold)}
.replist .cat{font-size:10px;color:var(--gold-dim);letter-spacing:.1em}
.replist .nm{font-size:12.5px;margin-top:2px;word-break:break-all}
.replist .tm{font-size:10.5px;color:var(--ink-dim);margin-top:2px}
.repview{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:24px 28px;overflow-y:auto;overflow-x:hidden;max-height:72vh;line-height:1.95;font-size:13.5px;font-weight:380;overflow-wrap:anywhere}
.repview .tblwrap{overflow-x:auto;max-width:100%;touch-action:auto}
.repview h1m{display:block;font-size:17px;color:var(--gold);margin:10px 0;font-weight:600;letter-spacing:.02em}
.repview h2m{display:block;font-size:15px;color:var(--gold);margin:14px 0 6px;font-weight:550}
.repview table{border-collapse:collapse;margin:10px 0;width:100%}
.repview td,.repview th{border:1px solid var(--line);padding:5px 9px;font-size:12.5px;text-align:left}
.repview th{background:var(--panel2);color:var(--gold)}
.repview a{color:var(--blue);word-break:break-all}
.repview .l0{display:block}
.repview .l1{display:block;padding-left:1.2em}
.repview .l2{display:block;padding-left:2.4em;color:#cfc8b8}
.repview p{margin:8px 0}
/* run tab */
.runbtns{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.authbar{background:#33200f;border:1px solid #7a5a2a;border-radius:10px;padding:13px 16px;margin-bottom:14px;font-size:13px;line-height:1.9;color:#e0b878}
.authbar code{background:#1d150a;border-radius:5px;padding:2px 8px;font-family:Consolas,monospace;color:#f0d9a8}
.runbtn{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;cursor:pointer;text-align:left;color:var(--ink);font-family:inherit}
.runbtn:hover{border-color:var(--gold-dim)}
.runbtn b{display:block;color:var(--gold);font-size:15px;margin-bottom:6px;font-weight:550;letter-spacing:.03em}
.runbtn span{font-size:12px;color:var(--ink-dim);line-height:1.6}
.evrow{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.evrow input{flex:1;min-width:280px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:10px 12px;font-family:inherit;font-size:13px}
button.act{background:linear-gradient(135deg,#d8b45f,#b08c3c);color:#171410;border:none;border-radius:8px;padding:10px 18px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500}
button.ghost{background:none;border:1px solid var(--line);color:var(--ink-dim);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:inherit;font-size:12px}
#runstate{font-size:13px;margin-bottom:10px}
#runstate .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;background:var(--ink-dim)}
#runstate.running .dot{background:var(--green);animation:pulse 1.2s infinite}
@keyframes pulse{50%{opacity:.3}}
#runlog{background:#0a0908;border:1px solid var(--line);border-radius:10px;padding:14px;font-family:Consolas,monospace;font-size:11.5px;color:#b9b19e;white-space:pre-wrap;max-height:46vh;overflow-y:auto;line-height:1.6}
.note{font-size:12px;color:var(--ink-dim);line-height:1.8;margin-top:12px}

const REMOTE_BASE='https://krw-watcher.tail3e31a9.ts.net/gucci/';
let RB=''; // '' = same origin; switched to REMOTE_BASE on the static site
async function fetchRun(path, opts){
  opts=opts||{};
  const key=localStorage.getItem('gi-key')||'';
  opts.headers=Object.assign({}, opts.headers||{}, key?{'X-Run-Key':key}:{});

// One report = one file (KO first, EN after the marker); the CLIENT picks the
// language, so the same code works on the live server and on static hosting.
const REP_CACHE=new Map(); // path -> raw bilingual content (lang split happens per render)
async function getReport(p){
  let raw;
  if(REP_CACHE.has(p)) raw=REP_CACHE.get(p);
  else{
    const d=await jget('api/report/'+p);
    if(d.error) return d;
    raw=d.content||'';
    REP_CACHE.set(p, raw);
    if(REP_CACHE.size>40) REP_CACHE.delete(REP_CACHE.keys().next().value);
  }
  const M='<!-- ===== ENGLISH EDITION ===== -->';
  let c=raw;
  if(c.includes(M)){ const parts=c.split(M); c=(LANG==='en'&&parts[1].trim())?parts[1].trim():parts[0].trim(); }
  // Korean view: the embedded English executive summary is redundant with the
  // full English edition — show it only in EN mode.
  if(LANG!=='en'){ c=c.replace(/\n##\s*Executive Summary[^\n]*\n[\s\S]*?(?=\n## |$)/, '\n'); }
  return {content:c};
}
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
// "업데이트" badge: shown only while the viewer's local date equals the
// content's publish date — disappears by itself the next day.
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function isToday(s){ return !!s && String(s).slice(0,10)===todayStr(); }
function updB(s){ return isToday(s)?`<span class="updbadge">${t().upd}</span>`:''; }
function bandCls(b){ return 'b-'+(b||'').replace(/\s/g,''); }
function bandKo2Lang(b){ return t().bands[b]||b; }
function fmtDelta(d){
  if(d===null||d===undefined||d==='') return t().deltaNone;
  const n=+d, cls=n>0?'up':(n<0?'down':'');
  return `${t().delta}<span class="${cls}">${n>0?'+':''}${n.toFixed(2)}</span>`;
}

async function loadDash(){

  if(!s.has_data){

  }
  $('dashEmpty').classList.add('hidden'); $('dashBody').classList.remove('hidden');
  $('hdrDate').textContent = s.date + t().asof + s.snapshot_count + t().days;
  let html = globalCard(s.global);
  for(const r of ['NEA','SEA','NA','EU']){
    const d = s.regions[r];
    html += d ? card(t().regions[r], d)
              : `<div class="card"><h3>${t().regions[r]}</h3><div class="num" style="color:var(--ink-dim)">—</div></div>`;
  }
  $('cards').innerHTML = html;
  renderSig(s);
  const v2 = s.triggers_v2;
  const trigLines = (v2 && v2.length) ? v2.map(g=>{
    if(g.code==='band_alert') return t().trigT.band_alert(t().regions[g.region]||g.region, g.gmai);
    if(g.code==='region_drop') return t().trigT.region_drop(t().regions[g.region]||g.region, g.delta);
    if(g.code==='global_delta') return t().trigT.global_delta(g.delta);
    return '';
  }).filter(Boolean) : (s.triggers||[]).map(x=>esc(x));
  $('trigPanel').classList.toggle('hidden', trigLines.length===0);
  $('trigList').innerHTML = trigLines.map(x=>`<div class="trigger">⚠ ${x}${t().trigTail}</div>`).join('');
  drawChart((await jget('/api/timeseries')).rows);
  renderGap(s); loadSov(); loadMix(s); loadPrevs();
}
function renderGap(s){
  const regs=['NEA','SEA','NA','EU'].filter(r=>s.regions[r]&&s.regions[r].contrib);
  if(!regs.length){ $('gapBox').innerHTML=''; return; }
  const g=s.global.GMAI;
  const cols=t().gapCols;
  let h=`<table class="gt"><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>`;
  for(const r of regs){
    const d=s.regions[r], c=d.contrib;
    const diff=(d.GMAI-g);
    // find dominant gap driver: component contribution furthest from the
    // cross-region average of that component
    const avg={}; for(const k of ['sentiment','buzz','engagement','sov'])
      avg[k]=regs.reduce((a,q)=>a+s.regions[q].contrib[k],0)/regs.length;
    let drv='sentiment', best=0;
    for(const k of ['sentiment','buzz','engagement','sov']){
      const dv=Math.abs(c[k]-avg[k]); if(dv>best){best=dv;drv=k;}
    }
    h+=`<tr><td>${t().regions[r]}</td>
      <td style="${drv==='sentiment'?'color:var(--gold)':''}">${c.sentiment.toFixed(1)}p</td>
      <td style="${drv==='buzz'?'color:var(--gold)':''}">${c.buzz.toFixed(1)}p</td>
      <td style="${drv==='engagement'?'color:var(--gold)':''}">${c.engagement.toFixed(1)}p</td>
      <td style="${drv==='sov'?'color:var(--gold)':''}">${c.sov.toFixed(1)}p</td>
      <td><b style="font-weight:550">${d.GMAI.toFixed(1)}</b> <span class="band ${bandCls(d.band)}" style="margin-left:4px">${bandKo2Lang(d.band)}</span></td>
      <td style="color:${diff>=0?'var(--green)':'var(--red)'}">${diff>=0?'+':''}${diff.toFixed(1)} (${t().gapDrv[drv]})</td></tr>`;
  }
  h+=`</table><div class="note">${t().gapNote}</div>`;
  $('gapBox').innerHTML=h;
}
function gaugeSvg(v, band){
  const col = BAND_COLORS[band]||'#c9a24b';
  const a0=Math.PI, a1=Math.PI*(1-v/100);
  const cx=52,cy=50,R=40;
  const x1=cx+R*Math.cos(a0), y1=cy-R*Math.sin(a0);
  const x2=cx+R*Math.cos(a1), y2=cy-R*Math.sin(a1);
  // value arc spans v/100*180° — always the minor arc (large-arc flag 0);
  // the old (v>50)?1:0 flag made scores above 50 loop the long way round
  return `<svg class="gauge" width="104" height="58" viewBox="0 0 104 58">
    <path d="M ${x1} ${y1} A ${R} ${R} 0 0 1 ${cx+R} ${cy}" fill="none" stroke="#2e2a24" stroke-width="8" stroke-linecap="round"/>
    <path d="M ${x1} ${y1} A ${R} ${R} 0 0 1 ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="8" stroke-linecap="round"/>
  </svg>`;
}

function renderSig(s){

    });

  } else {

                 ...(d.drivers.neg||[]).slice(0,2).map(([tg,p])=>chip(tg,p,'var(--red)'))];

    const cov=(d.sentiment_coverage!=null&&d.sentiment_coverage<0.9)?`<span style="color:var(--red);font-size:11px;margin-left:4px">⚠ ${t().sigCovBad}</span>`:'';

/* ---------- chart ---------- */
function drawChart(rows){
  const W=1080,H=260,P={l:34,r:10,t:10,b:24};
  const dates=[...new Set(rows.map(r=>r.date))].sort();
  if(dates.length===0){ $('chart').innerHTML=`<div class="empty">${t().noTs}</div>`; return; }
  const x=i=>dates.length<2 ? (P.l+W-P.r)/2 : P.l+(W-P.l-P.r)*i/(dates.length-1);
  const y=v=>P.t+(H-P.t-P.b)*(1-v/100);
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">`;
  const zones=[[75,100,'#1d4d33'],[60,75,'#22392c'],[45,60,'#2b2820'],[30,45,'#39301e'],[0,30,'#3a2020']];
  for(const [a,b,col] of zones)
    svg+=`<rect x="${P.l}" y="${y(b)}" width="${W-P.l-P.r}" height="${y(a)-y(b)}" fill="${col}" opacity="0.35"/>`;
  for(const g of [0,25,50,75,100])
    svg+=`<line x1="${P.l}" y1="${y(g)}" x2="${W-P.r}" y2="${y(g)}" stroke="#2e2a24"/><text x="4" y="${y(g)+4}" fill="#9a927f" font-size="10">${g}</text>`;
  for(const reg of ['NEA','SEA','NA','EU','GLOBAL']){
    const pts=dates.map((d,i)=>{const r=rows.find(q=>q.date===d&&q.region===reg);return r?[x(i),y(r.GMAI)]:null;}).filter(Boolean);
    if(!pts.length) continue;
    const w=reg==='GLOBAL'?3:1.5, o=reg==='GLOBAL'?1:0.75;
    svg+=`<polyline points="${pts.map(p=>p.join(',')).join(' ')}" fill="none" stroke="${LINE_COLORS[reg]}" stroke-width="${w}" opacity="${o}"/>`;
    for(const p of pts) svg+=`<circle cx="${p[0]}" cy="${p[1]}" r="${reg==='GLOBAL'?3:2}" fill="${LINE_COLORS[reg]}"/>`;
  }
  const step=Math.max(1,Math.ceil(dates.length/12));
  dates.forEach((d,i)=>{ if(i%step===0||i===dates.length-1)
    svg+=`<text x="${x(i)}" y="${H-6}" fill="#9a927f" font-size="10" text-anchor="middle">${d.slice(5)}</text>`;});
  svg+='</svg>';
  $('chart').innerHTML=svg;
  $('legend').innerHTML=['GLOBAL','NEA','SEA','NA','EU'].map(r=>
    `<span><i style="background:${LINE_COLORS[r]}"></i>${t().regions[r]}</span>`).join('');
}

  return diff===0?'-DAY':(diff>0?'-'+diff:'+'+(-diff));

async function loadLux(){

    $('luxGroups').innerHTML='';
    $('luxBody').innerHTML=`<div class="empty">${t().luxEmpty}<br><span class="go" onclick="showTab('run')">${t().goRun}</span></div>`;
    return;
  }
  const groups=Object.keys(luxData.groups).sort((a,b)=>(a==='Gucci'?-1:b==='Gucci'?1:a.localeCompare(b)));
  if(!luxSel||!groups.includes(luxSel)) luxSel=groups[0];
  $('luxGroups').innerHTML = groups.map(g=>
    `<button class="${g===luxSel?'on':''}" data-g="${esc(g)}" onclick="selLux('${esc(g)}')">${t().groups[g]||g} (${luxData.groups[g].length})</button>`).join('')
    + `<span class="note" style="align-self:center;margin-left:6px">${luxData.date}${t().luxAsof}</span>`;

function selLux(g){ luxSel=g;
  for(const b of $('luxGroups').querySelectorAll('button')) b.classList.toggle('on', b.dataset.g===g);
  renderLux();
}
function renderLux(){
  const items=luxData.groups[luxSel]||[];
  if(!items.length){ $('luxBody').innerHTML=`<div class="empty">${t().luxNone}</div>`; return; }
  const TAGC={'competitive threat':'threat','benchmark opportunity':'bench','category trend':'trend','unrelated':'etc'};
  let _lx = items.map(it=>{
    const key=(it.relevance||'').toLowerCase();
    const cls=TAGC[key]||'etc', ko=t().tags[key]||it.relevance||'';

      <div class="top"><span class="brand">${esc(it.brand||'')}</span>
        <span class="etype">${esc(it.event_type||'')}</span>
        <span class="tag ${cls}">${esc(ko)}</span></div>
      <div class="hd">${esc(it.headline||'')}${updB(it.published_at)}</div>
      ${why?`<div class="why">${t().gucciView}${esc(why)}</div>`:''}
      <div class="src">${esc(it.source||'')} ${it.tier?'· '+esc(it.tier):''} ${it.published_at?'· '+esc(it.published_at):''}
        ${it.url?` · <a href="${esc(it.url)}" target="_blank">${t().orig}</a>`:''}</div>
    </div>`;
  }).join('');
  const kp=(luxData.keeps&&luxData.keeps[luxSel])||[];
  if(kp.length){
    _lx += `<h2 class="sec" style="margin-top:16px">${t().arch}</h2><div class="note" style="margin:-4px 0 10px">${t().archNote}</div>`
      + kp.map(it=>{
        const why = LANG==='en' ? (it.why_it_matters_en||it.why_it_matters||'') : (it.why_it_matters||it.why_it_matters_en||'');
        return `<div class="luxitem" style="opacity:.85"><div class="top"><span class="brand">${esc(it.brand||'')}</span><span class="etype">${esc(it.published_at||'')}</span></div>
          <div class="hd">${esc(it.headline||'')}</div>
          ${why?`<div class="why">${t().gucciView}${esc(why)}</div>`:''}
          <div class="src">${esc(it.source||'')}${it.url?` · <a href="${esc(it.url)}" target="_blank">${t().orig}</a>`:''}</div></div>`;}).join('');

function repKindOf(name){
  const rest=name.replace(/^\d{4}-\d{2}-\d{2}-?/,'');

function toggleRepDate(date){

  if(repOpen.has(date)) repOpen.delete(date); else repOpen.add(date);

function renderRepList(){
  const reps=repCache||[];
  if(!reps.length){ $('replist').innerHTML=`<div class="empty">${t().noPrev}</div>`; return; }

  const groups={};
  for(const r of reps){
    const m=r.name.match(/^(\d{4}-\d{2}-\d{2})/);
    const date=m?m[1]:(r.mtime||'').slice(0,10);
    (groups[date]=groups[date]||[]).push(r);
  }
  const dates=Object.keys(groups).sort().reverse();
  if(!repOpen) repOpen=new Set(dates.slice(0,1)); // latest date open by default
  $('replist').innerHTML=dates.map(date=>{
    const open=repOpen.has(date);
    const items=groups[date].slice().sort((a,b)=>{
      const ka=REP_KIND_ORDER.indexOf(repKindOf(a.name)), kb=REP_KIND_ORDER.indexOf(repKindOf(b.name));
      return (ka<0?9:ka)-(kb<0?9:kb) || a.name.localeCompare(b.name);
    });
    const rows=open?items.map(r=>{
      const kind=repKindOf(r.name);
      const label=kind?t().repKinds[kind]:esc(r.name.replace(/^\d{4}-\d{2}-\d{2}-?/,''));
      return `<div class="item ${curReport===r.path?'on':''}" onclick="openReport('${r.path}')">
        <div class="cat">${t().cats[r.category]||r.category}</div>
        <div class="nm">${label}${updB(r.mtime)}</div><div class="tm">${r.mtime}</div></div>`;
    }).join(''):'';
    return `<div class="repdate ${open?'open':''}" onclick="toggleRepDate('${date}')">
      <span class="arr">${open?'▾':'▸'}</span>${date}${groups[date].some(r=>isToday(r.mtime))?updB(todayStr()):''}<span class="cnt">${items.length}</span></div>`+rows;
  }).join('');
}
async function loadReports(){
  const d=await jget('/api/reports');
  repCache=d.reports.filter(r=>r.category==='daily'||r.category==='weekly');
  renderRepList();
}
async function openReport(p){
  curReport=p;
  const d=await getReport(p);
  $('repview').innerHTML = d.error ? `<div class="empty">${esc(d.error)}</div>` : renderMd(d.content);
  loadReports();
}
function renderMd(text){
  const lines=text.split(/\r?\n/); let out=[],tbl=[],para=[];
  const flushPara=()=>{ if(para.length){ out.push('<p>'+para.join(' ')+'</p>'); para=[]; } };
  const flushTbl=()=>{ if(!tbl.length) return;
    let h='<table>';
    tbl.forEach((cells,i)=>{
      if(cells.every(c=>/^[-: ]+$/.test(c))) return;
      const tag=i===0?'th':'td';
      h+='<tr>'+cells.map(c=>`<${tag}>${linkify(esc(c))}</${tag}>`).join('')+'</tr>';
    });
    out.push('<div class="tblwrap">'+h+'</table></div>'); tbl=[]; };
  for(const raw of lines){
    const tx=raw.trimEnd();
    if(/^\|.*\|$/.test(tx.trim())){ flushPara(); tbl.push(tx.trim().slice(1,-1).split('|').map(s=>s.trim())); continue; }
    flushTbl();
    if(tx.trim()===''){ flushPara(); continue; }
    let m;
    if(m=tx.match(/^#{1,2}\s+(.*)/)){ flushPara(); out.push(`<h1m>${linkify(esc(m[1]))}</h1m>`); continue; }
    if(m=tx.match(/^#{3,6}\s+(.*)/)){ flushPara(); out.push(`<h2m>${linkify(esc(m[1]))}</h2m>`); continue; }
    const s=tx.trim();
    if(s.startsWith('□')||s.startsWith('○')||s.startsWith('·')||/^[-*]\s/.test(s)){
      flushPara();
      const cls = s.startsWith('□')?'l0' : s.startsWith('○')?'l1' : 'l2';
      out.push(`<span class="${cls}">${linkify(esc(s))}</span>`);
    } else {
      para.push(linkify(esc(s)));
    }
  }
  flushPara(); flushTbl();
  return out.join('');
}
function linkify(s){ return s.replace(/(https?:\/\/[^\s<)\]]+)/g,'<a href="$1" target="_blank">$1</a>'); }

/* ---------- run ---------- */
let pendingRun=null, noticeTimer=null;
function notify(msg){
  const n=$('notice'); n.textContent=msg; n.classList.remove('hidden');
  clearTimeout(noticeTimer); noticeTimer=setTimeout(()=>n.classList.add('hidden'), 6000);
}
async function runCmd(cmd,arg){
  let st=null;
  try{ st=await fetchRun('api/status'); }catch(e){ notify(t().engineOff); return; }
  if(!st.claude_available){ notify(t().noClaude); return; }
  if(st.running){ notify(t().already+(t().cmds[st.cmd]||st.cmd)); return; }
  if(st.key_required && !localStorage.getItem('gi-key')){ $('keyRow').classList.remove('hidden'); notify(t().keyBad); return; }
  pendingRun={cmd,arg:arg||''};
  $('confirmMsg').textContent=t().confirm(t().cmds[cmd]||cmd, arg||'');
  $('confirmBar').classList.remove('hidden');
}
function cancelRun(){ pendingRun=null; $('confirmBar').classList.add('hidden'); }
async function confirmRun(){
  if(!pendingRun) return;
  const {cmd,arg}=pendingRun; cancelRun();
  let d=null;
  try{
    d=await fetchRun('api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cmd,arg})});
  }catch(e){ notify(t().engineOff); return; }
  if(d.error){
    if((d.error+'').includes('key')){ localStorage.removeItem('gi-key'); $('keyRow').classList.remove('hidden'); notify(t().keyBad); }
    else notify(t().failed+d.error);
  } else notify((t().cmds[cmd]||cmd)+t().started);
  pollRun();
}
function runEvent(cmd){
  const v=$('evName').value.trim();
  if(!v){ notify(t().evNeed); return; }
  runCmd(cmd, v);
}
async function pollRun(){
  clearTimeout(pollTimer);
  let st=null;
  try{ st=await fetchRun('api/status'); }catch(e){ st=null; }
  if(st && st.static){  // baked snapshot (GitHub Pages) → control the engine remotely
    RB=REMOTE_BASE;
    try{ st=await fetchRun('api/status'); }catch(e){ st=null; }
  }
  if(!st){  // engine unreachable (PC off) — viewing still works
    $('engineOff').innerHTML=t().engineOff; $('engineOff').classList.remove('hidden');
    $('keyRow').classList.add('hidden');
    $('runstate').classList.remove('running');
    $('runtext').textContent=t().idle; $('hdrStatus').textContent='';
    pollTimer=setTimeout(pollRun, curTab==='run'?30000:120000);
    return;
  }
  $('engineOff').classList.add('hidden');
  if(RB==='' && st.ui_mtime){ if(uiMtime===null) uiMtime=st.ui_mtime; else if(st.ui_mtime!==uiMtime) location.reload(); }
  document.body.classList.toggle('ro', !!st.readonly);
  $('keyRow').classList.toggle('hidden', !(st.key_required && !localStorage.getItem('gi-key')));
  const el=$('runstate');
  el.classList.toggle('running', st.running);
  if(st.running){
    $('runtext').textContent=t().running(t().cmds[st.cmd]||st.cmd, st.started);
    $('hdrStatus').textContent=t().hdrRunning;
  }else if(st.cmd){
    $('runtext').textContent=t().done(t().cmds[st.cmd]||st.cmd, st.exit);
    $('hdrStatus').textContent='';
  }else{
    $('runtext').textContent=t().idle; $('hdrStatus').textContent='';
  }
  $('authBar').classList.toggle('hidden', !st.auth_error);
  if(st.auth_error) $('hdrStatus').textContent=t().hdrAuth;
  $('runnote').textContent = st.claude_available ? (st.key_required ? t().runnoteRemote : t().runnoteOk) : t().runnoteNo;
  try{
    const lg=await fetchRun('api/runlog');
    if(lg.lines && lg.lines.length){ const box=$('runlog'); box.textContent=lg.lines.join('\n'); box.scrollTop=box.scrollHeight; }
  }catch(e){}
  pollTimer=setTimeout(pollRun, st.running?4000:(curTab==='run'?15000:60000));
}
function refreshAll(){ REP_CACHE.clear(); loadDash(); if(curTab==='rep')loadReports(); if(curTab==='sp')loadSpecial(); if(curTab==='news')loadNews(); if(curTab==='lux')loadLux(); if(curTab==='prod')loadProd(); if(curTab==='cal')loadCal(); if(curTab==='amb')loadAmb(); if(curTab==='cd')loadCd(); if(curTab==='guide')renderGuide(); pollRun(); }
applyChrome(); renderGuide(); loadDash(); pollRun();
